<mat-toolbar color="primary">
  <mat-icon>medical_services</mat-icon>
  <span style="margin-left: 10px;">Siemens Healthineers - Device Manager</span>
  <span class="spacer"></span>
  <button mat-raised-button color="accent" (click)="openAddDialog()">
    <mat-icon>add</mat-icon> ADD DEVICE
  </button>
</mat-toolbar>

<mat-progress-bar *ngIf="isLoading" mode="indeterminate"></mat-progress-bar>

<div class="container" style="padding: 20px;">
  
  <h2>Active Medical Devices</h2>

  <table mat-table [dataSource]="devices" class="mat-elevation-z8 w-100">

    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef> ID </th>
      <td mat-cell *matCellDef="let element"> {{element.id}} </td>
    </ng-container>

    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef> Name </th>
      <td mat-cell *matCellDef="let element"> {{element.name}} </td>
    </ng-container>

    <ng-container matColumnDef="modelName">
      <th mat-header-cell *matHeaderCellDef> Model </th>
      <td mat-cell *matCellDef="let element"> {{element.modelName}} </td>
    </ng-container>

    <ng-container matColumnDef="serialNumber">
      <th mat-header-cell *matHeaderCellDef> Serial No. </th>
      <td mat-cell *matCellDef="let element"> {{element.serialNumber}} </td>
    </ng-container>

    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef> Status </th>
      <td mat-cell *matCellDef="let element">
        <span [class]="'status-badge ' + (element.status ? element.status.toLowerCase() : '')">
          {{element.status}}
        </span>
      </td>
    </ng-container>

    <ng-container matColumnDef="actions">
  <th mat-header-cell *matHeaderCellDef> Actions </th>
  <td mat-cell *matCellDef="let element">
    <button mat-icon-button color="primary" (click)="openEditDialog(element)">
      <mat-icon>edit</mat-icon>
    </button>
    
    <button mat-icon-button color="warn" (click)="deleteDevice(element.id!)">
      <mat-icon>delete</mat-icon>
    </button>
  </td>
</ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>

</div>
